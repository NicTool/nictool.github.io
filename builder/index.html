<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NicTool DNS Record Builder</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin-top: 50px;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
        }
        .card-header {
            border-bottom: 1px solid #30363d;
            background-color: #161b22;
        }
        .form-control, .form-select {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }
        .form-control:focus, .form-select:focus {
            background-color: #0d1117;
            border-color: #58a6ff;
            color: #c9d1d9;
            box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.3);
        }
        .btn-primary {
            background-color: #238636;
            border-color: #2ea043;
        }
        .btn-primary:hover {
            background-color: #2ea043;
            border-color: #3fb950;
        }
        .record-preview {
            background-color: #0d1117;
            border: 1px solid #30363d;
            padding: 15px;
            border-radius: 6px;
            font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 15px;
        }
        .copy-btn {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }
        .copy-btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="mb-4">
            <h1 class="h2">NicTool DNS Record Builder</h1>
            <p class="text-secondary">Generate RFC-compliant DNS resource records using <code>@nictool/dns-resource-record</code>.</p>
        </header>

        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Record Configuration</h5>
            </div>
            <div class="card-body">
                <form id="recordForm">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="recordName" class="form-label">Record Name</label>
                            <input type="text" id="recordName" class="form-control" value="example.com." placeholder="example.com.">
                        </div>
                        <div class="col-md-3">
                            <label for="rrType" class="form-label">Type</label>
                            <select id="rrType" class="form-select">
                                <option value="" disabled selected>Loading...</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="ttl" class="form-label">TTL</label>
                            <input type="number" id="ttl" class="form-control" value="3600" min="0">
                        </div>
                    </div>

                    <div id="dynamicFields">
                        <!-- Fields will be populated here -->
                    </div>
                </form>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Record Preview</h5>
                <button id="copyBtn" class="btn btn-sm btn-outline-secondary copy-btn">Copy to Clipboard</button>
            </div>
            <div class="card-body">
                <div id="recordPreview" class="record-preview">Loading...</div>
                <div id="outputFormat" class="text-secondary small">Format: Generic / Tinydns</div>
            </div>
        </div>

        <footer class="text-center text-secondary small mt-5">
            Built with <code>@nictool/dns-resource-record</code> &middot; <a href="/" class="text-secondary text-decoration-underline">Back to NicTool Home</a>
        </footer>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import * as dnsRR from 'https://esm.sh/@nictool/dns-resource-record';

        const rrTypeSelect = document.getElementById('rrType');
        const dynamicFields = document.getElementById('dynamicFields');
        const recordPreview = document.getElementById('recordPreview');
        const copyBtn = document.getElementById('copyBtn');
        const form = document.getElementById('recordForm');

        const supportedTypes = Object.keys(dnsRR).filter(key => {
            // Filter classes that are resource record types
            // Typically these are all uppercase (A, MX, etc.)
            return /^[A-Z][A-Z0-9]*$/.test(key) && typeof dnsRR[key] === 'function';
        });

        function init() {
            rrTypeSelect.innerHTML = supportedTypes.map(type => `<option value="${type}">${type}</option>`).join('');
            rrTypeSelect.value = supportedTypes.includes('A') ? 'A' : supportedTypes[0];
            updateFields();
            updatePreview();
        }

        function updateFields() {
            const type = rrTypeSelect.value;
            const RRClass = dnsRR[type];
            if (!RRClass) return;

            const commonFields = {
                'A': [{ name: 'address', label: 'IP Address', type: 'text', placeholder: '192.0.2.1' }],
                'AAAA': [{ name: 'address', label: 'IPv6 Address', type: 'text', placeholder: '2001:db8::1' }],
                'MX': [
                    { name: 'preference', label: 'Preference', type: 'number', placeholder: '10' },
                    { name: 'exchange', label: 'Mail Exchange', type: 'text', placeholder: 'mail.example.com.' }
                ],
                'TXT': [{ name: 'data', label: 'Text Data', type: 'text', placeholder: 'v=spf1 ...' }],
                'CNAME': [{ name: 'cname', label: 'Target', type: 'text', placeholder: 'example.com.' }],
                'DNAME': [{ name: 'target', label: 'Target', type: 'text', placeholder: 'example.com.' }],
                'NS': [{ name: 'dname', label: 'Name Server', type: 'text', placeholder: 'ns1.example.com.' }],
                'PTR': [{ name: 'dname', label: 'Pointer Name', type: 'text', placeholder: 'host.example.com.' }],
                'SRV': [
                    { name: 'priority', label: 'Priority', type: 'number', placeholder: '10' },
                    { name: 'weight', label: 'Weight', type: 'number', placeholder: '10' },
                    { name: 'port', label: 'Port', type: 'number', placeholder: '53' },
                    { name: 'target', label: 'Target', type: 'text', placeholder: 'example.com.' }
                ],
                'CAA': [
                    { name: 'flags', label: 'Flags', type: 'number', placeholder: '0' },
                    { name: 'tag', label: 'Tag', type: 'text', placeholder: 'issue' },
                    { name: 'value', label: 'Value', type: 'text', placeholder: 'letsencrypt.org' }
                ],
                'NAPTR': [
                    { name: 'order', label: 'Order', type: 'number', placeholder: '100' },
                    { name: 'preference', label: 'Preference', type: 'number', placeholder: '10' },
                    { name: 'flags', label: 'Flags', type: 'text', placeholder: 'u' },
                    { name: 'services', label: 'Services', type: 'text', placeholder: 'sip+E2U' },
                    { name: 'regexp', label: 'Regexp', type: 'text', placeholder: '!^.*$!sip:user@example.com!' },
                    { name: 'replacement', label: 'Replacement', type: 'text', placeholder: '.' }
                ],
                'SOA': [
                    { name: 'mname', label: 'Primary NS', type: 'text', placeholder: 'ns1.example.com.' },
                    { name: 'rname', label: 'Admin Email', type: 'text', placeholder: 'admin.example.com.' },
                    { name: 'serial', label: 'Serial', type: 'number', placeholder: '2023010101' },
                    { name: 'refresh', label: 'Refresh', type: 'number', placeholder: '16384' },
                    { name: 'retry', label: 'Retry', type: 'number', placeholder: '2048' },
                    { name: 'expire', label: 'Expire', type: 'number', placeholder: '1048576' },
                    { name: 'minimum', label: 'Minimum TTL', type: 'number', placeholder: '2560' }
                ],
                'HINFO': [
                    { name: 'cpu', label: 'CPU', type: 'text', placeholder: 'PC-Intel' },
                    { name: 'os', label: 'OS', type: 'text', placeholder: 'Linux' }
                ],
                'RP': [
                    { name: 'mbox', label: 'Mailbox', type: 'text', placeholder: 'admin.example.com.' },
                    { name: 'txtdname', label: 'TXT Pointer', type: 'text', placeholder: 'admin-info.example.com.' }
                ]
            };

            const fields = commonFields[type] || [{ name: 'rdata', label: 'RData', type: 'text', placeholder: '...' }];
            
            dynamicFields.innerHTML = fields.map(field => `
                <div class="mb-3">
                    <label for="field_${field.name}" class="form-label">${field.label}</label>
                    <input type="${field.type}" id="field_${field.name}" name="${field.name}" class="form-control" placeholder="${field.placeholder}" required>
                </div>
            `).join('');

            // Re-attach listeners
            dynamicFields.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', updatePreview);
            });
        }

        function updatePreview() {
            const type = rrTypeSelect.value;
            const owner = document.getElementById('recordName').value || 'example.com.';
            const ttl = parseInt(document.getElementById('ttl').value) || 3600;
            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => {
                if (value === '') return;
                // Try to parse numbers where appropriate
                if (/^\d+$/.test(value)) {
                    data[key] = parseInt(value);
                } else {
                    data[key] = value;
                }
            });

            try {
                const RRClass = dnsRR[type];
                const rr = new RRClass({
                    owner: owner,
                    ttl: ttl,
                    ...data
                });
                recordPreview.innerText = rr.getTinydns();
                recordPreview.classList.remove('text-danger');
            } catch (err) {
                recordPreview.innerText = 'Error: ' + err.message;
                recordPreview.classList.add('text-danger');
            }
        }

        rrTypeSelect.addEventListener('change', () => {
            updateFields();
            updatePreview();
        });

        document.getElementById('ttl').addEventListener('input', updatePreview);
        document.getElementById('recordName').addEventListener('input', updatePreview);

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(recordPreview.innerText).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = 'Copied!';
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                }, 2000);
            });
        });

        init();
    </script>
</body>
</html>
